<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>JDS — 25 Years</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --tv-cream:    #d8c8a4;
    --tv-cream-d:  #a89878;
    --tv-cream-l:  #ece0bc;
    --tv-shadow:   #3a2f1a;
    --speccy:      #1a1a1a;
    --key:         #4a4a4a;
    --key-l:       #6a6a6a;
    --key-letter:  #f0f0f0;
    --rainbow-r:   #e8262a;
    --rainbow-y:   #f0c020;
    --rainbow-g:   #00a050;
    --rainbow-c:   #009ec8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    background:
      radial-gradient(ellipse at 50% 80%, #5a3a20 0%, #3a2410 55%, #1a0e08 100%),
      #1a0e08;
    font-family: 'VT323', monospace;
    color: #d8c8a4;
    overflow-x: hidden;
    min-height: 100vh;
    padding: 30px 20px 60px;
  }

  /* faux wood grain */
  body::before {
    content: "";
    position: fixed; inset: 0;
    background:
      repeating-linear-gradient(92deg,
        transparent 0px, transparent 38px,
        rgba(0,0,0,0.08) 39px, rgba(0,0,0,0.08) 40px,
        transparent 41px, transparent 81px,
        rgba(0,0,0,0.04) 82px, rgba(0,0,0,0.04) 84px),
      repeating-linear-gradient(88deg,
        transparent 0px, transparent 13px,
        rgba(255,220,180,0.02) 14px, rgba(255,220,180,0.02) 15px);
    pointer-events: none;
    z-index: 0;
  }

  .scene {
    position: relative;
    z-index: 2;
    width: min(820px, 100%);
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* ---------- antenna ---------- */
  .antenna {
    position: relative;
    width: 320px;
    height: 90px;
    margin-bottom: -10px;
    z-index: 1;
  }
  .antenna::before, .antenna::after {
    content: "";
    position: absolute;
    bottom: 0;
    width: 4px;
    height: 90px;
    background: linear-gradient(to top, #888 0%, #ccc 60%, #fff 100%);
    box-shadow: 0 0 4px rgba(0,0,0,0.7);
    transform-origin: bottom center;
    border-radius: 2px;
  }
  .antenna::before { left: 30%;  transform: rotate(-22deg); }
  .antenna::after  { right: 30%; transform: rotate(22deg);  }

  /* ---------- TV cabinet ---------- */
  .tv {
    position: relative;
    width: 760px;
    max-width: 100%;
    border-radius: 38px 38px 30px 30px;
    background:
      linear-gradient(155deg,
        var(--tv-cream-l) 0%,
        var(--tv-cream)   30%,
        var(--tv-cream-d) 100%);
    padding: 36px 100px 50px 36px;
    box-shadow:
      inset 0 4px 0 rgba(255,255,255,0.5),
      inset 0 -8px 16px rgba(0,0,0,0.25),
      0 24px 60px rgba(0,0,0,0.7),
      0 4px 0 rgba(0,0,0,0.4);
    z-index: 2;
  }

  .tv::before {
    /* TV brand badge */
    content: "PORTAVISION  14";
    position: absolute;
    bottom: 14px;
    left: 36px;
    font-family: 'VT323', monospace;
    font-size: 16px;
    letter-spacing: 4px;
    color: var(--tv-shadow);
    opacity: 0.55;
  }

  .tv::after {
    /* power LED */
    content: "";
    position: absolute;
    bottom: 22px;
    left: 240px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #ffaaaa 0%, #cc1010 60%, #800000 100%);
    box-shadow: 0 0 10px rgba(255,40,40,0.8);
  }

  /* screen bezel inside TV */
  .screen-bezel {
    position: relative;
    width: 100%;
    aspect-ratio: 4 / 3;
    border-radius: 22px;
    background:
      linear-gradient(160deg, #3a3024 0%, #1a1410 50%, #0a0806 100%);
    padding: 14px;
    box-shadow:
      inset 0 4px 8px rgba(0,0,0,0.8),
      inset 0 -2px 4px rgba(255,255,255,0.05);
  }

  .screen {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 28px / 18px;  /* slight CRT curve */
    overflow: hidden;
    background: #000;
    box-shadow:
      inset 0 0 80px rgba(0,0,0,0.7),
      inset 0 0 12px rgba(80,200,255,0.08);
  }

  /* CRT subtle curve highlight */
  .screen::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 130% 100% at 50% -30%, rgba(255,255,255,0.10), transparent 50%),
      radial-gradient(ellipse 100% 80% at 50% 130%, rgba(0,0,0,0.5), transparent 60%);
    pointer-events: none;
    z-index: 30;
    mix-blend-mode: screen;
  }
  /* scanlines */
  .screen::after {
    content: "";
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.18) 3px,
      rgba(0,0,0,0.18) 4px
    );
    pointer-events: none;
    z-index: 25;
  }

  #jsspeccy {
    position: absolute;
    inset: 0;
    background: #000;
    z-index: 10;
  }
  /* Crisp pixel rendering for the canvas inside */
  #jsspeccy canvas {
    width: 100% !important;
    height: 100% !important;
    image-rendering: pixelated;
    -ms-interpolation-mode: nearest-neighbor;
    display: block;
  }

  /* knobs panel on right side of TV */
  .knobs {
    position: absolute;
    top: 50px;
    right: 24px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    z-index: 3;
  }
  .knob {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 35% 30%, #5a4a2e 0%, #2a1f12 70%, #0e0904 100%);
    box-shadow:
      inset 0 2px 3px rgba(255,255,255,0.15),
      inset 0 -2px 3px rgba(0,0,0,0.6),
      0 2px 4px rgba(0,0,0,0.4);
    position: relative;
  }
  .knob::after {
    /* indicator dash */
    content: "";
    position: absolute;
    top: 6px;
    left: 50%;
    transform: translateX(-50%);
    width: 3px;
    height: 12px;
    background: #d8c8a4;
    border-radius: 2px;
  }
  .knob.fine::after { transform: translateX(-50%) rotate(35deg); transform-origin: bottom center; }
  .knob-label {
    font-size: 13px;
    text-align: center;
    color: var(--tv-shadow);
    margin-top: -16px;
    letter-spacing: 1px;
  }

  /* speaker grille below knobs */
  .speaker {
    position: absolute;
    bottom: 40px;
    right: 24px;
    width: 50px;
    height: 70px;
    background: repeating-linear-gradient(
      to bottom,
      #2a1f12 0px, #2a1f12 2px,
      var(--tv-cream-d) 2px, var(--tv-cream-d) 5px
    );
    border-radius: 4px;
    box-shadow: inset 0 0 6px rgba(0,0,0,0.5);
  }

  /* ---------- coiled cable ---------- */
  .cable {
    position: relative;
    width: 360px;
    height: 130px;
    margin: -8px 0 -8px 60px;
    z-index: 1;
    align-self: flex-start;
  }

  /* ---------- ZX Spectrum 48K ---------- */
  .speccy {
    position: relative;
    width: 760px;
    max-width: 100%;
    height: 240px;
    background:
      linear-gradient(178deg, #1a1a1a 0%, #0a0a0a 30%, #0a0a0a 80%, #050505 100%);
    border-radius: 8px 8px 14px 14px;
    box-shadow:
      inset 0 2px 0 rgba(255,255,255,0.08),
      inset 0 -2px 8px rgba(0,0,0,0.8),
      0 24px 50px rgba(0,0,0,0.7);
    padding: 22px 26px 20px 26px;
    z-index: 2;
  }

  /* the recessed rubber-mat area where the keys live */
  .keymat {
    position: relative;
    background:
      linear-gradient(180deg, #161616 0%, #1f1f1f 50%, #161616 100%);
    border-radius: 4px;
    padding: 10px 12px;
    box-shadow:
      inset 0 2px 6px rgba(0,0,0,0.9),
      inset 0 -1px 0 rgba(255,255,255,0.04);
    width: 540px;
  }

  .row {
    display: flex;
    gap: 6px;
    margin-bottom: 6px;
  }
  .row:last-child { margin-bottom: 0; }

  .key {
    flex: 1;
    height: 26px;
    background:
      linear-gradient(180deg, var(--key-l) 0%, var(--key) 50%, #2e2e2e 100%);
    border-radius: 3px;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.18),
      inset 0 -1px 2px rgba(0,0,0,0.6),
      0 1px 0 rgba(0,0,0,0.5);
    font-family: 'VT323', monospace;
    font-size: 14px;
    color: var(--key-letter);
    display: flex;
    align-items: center;
    justify-content: center;
    letter-spacing: 0;
  }
  .key.wide { flex: 1.6; font-size: 11px; letter-spacing: 1px; }

  /* Sinclair logo + rainbow stripe — bottom edge */
  .badge {
    position: absolute;
    left: 26px;
    bottom: 14px;
    display: flex;
    align-items: baseline;
    gap: 8px;
    color: #d0d0d0;
  }
  .badge .sinclair {
    font-family: Helvetica, Arial, sans-serif;
    font-size: 13px;
    font-weight: 700;
    font-style: italic;
    letter-spacing: 1px;
    color: #c8c8c8;
  }
  .badge .zx {
    font-family: Helvetica, Arial, sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #909090;
  }

  .rainbow {
    position: absolute;
    right: 30px;
    bottom: 16px;
    width: 90px;
    height: 26px;
    transform: skewX(-32deg);
    display: flex;
    gap: 1px;
  }
  .rainbow span {
    flex: 1;
    height: 100%;
  }
  .rainbow span:nth-child(1) { background: var(--rainbow-r); }
  .rainbow span:nth-child(2) { background: var(--rainbow-y); }
  .rainbow span:nth-child(3) { background: var(--rainbow-g); }
  .rainbow span:nth-child(4) { background: var(--rainbow-c); }

  /* the famous chamfered front lip on the Spectrum case (right side) */
  .speccy::after {
    content: "";
    position: absolute;
    top: 0;
    right: 0;
    width: 200px;
    height: 240px;
    background: linear-gradient(195deg, transparent 0%, transparent 40%, #050505 100%);
    border-radius: 0 8px 14px 0;
    pointer-events: none;
  }

  /* Footer caption */
  .caption {
    margin-top: 24px;
    font-family: 'VT323', monospace;
    font-size: 18px;
    color: #a89878;
    text-align: center;
    letter-spacing: 1px;
    z-index: 3;
    position: relative;
    line-height: 1.4;
  }
  .caption .quiet { opacity: 0.55; }

  /* responsive */
  @media (max-width: 820px) {
    .tv { padding: 26px 80px 36px 22px; }
    .knobs { top: 36px; right: 18px; }
    .knob { width: 38px; height: 38px; }
    .speaker { width: 38px; height: 52px; bottom: 28px; right: 18px; }
    .speccy { padding: 16px 18px 14px 18px; height: 200px; }
    .keymat { width: calc(100% - 220px); }
    .key { height: 22px; font-size: 12px; }
    .cable { width: 60%; margin-left: 8%; height: 100px; }
    .antenna { width: 220px; height: 70px; }
    .antenna::before, .antenna::after { height: 70px; }
  }
  @media (max-width: 540px) {
    .scene { gap: 0; }
    .tv { padding: 18px 14px 28px; border-radius: 22px 22px 18px 18px; }
    .knobs, .speaker { display: none; }  /* simplify on tiny screens */
    .speccy { padding: 12px 12px 10px; height: auto; }
    .keymat { width: 100%; }
    .badge, .rainbow { position: static; margin-top: 10px; }
    .badge { display: inline-flex; }
    .speccy::after { display: none; }
    .cable { display: none; }
  }
</style>
</head>
<body>

<div class="scene">

  <div class="antenna" aria-hidden="true"></div>

  <div class="tv" aria-label="CRT television">
    <div class="screen-bezel">
      <div class="screen">
        <div id="jsspeccy"></div>
      </div>
    </div>
    <div class="knobs" aria-hidden="true">
      <div class="knob"></div>
      <div class="knob fine"></div>
    </div>
    <div class="speaker" aria-hidden="true"></div>
  </div>

  <!-- coiled RF cable: SVG curve from TV bottom-left into Speccy top -->
  <svg class="cable" viewBox="0 0 360 130" aria-hidden="true">
    <defs>
      <pattern id="coil" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
        <path d="M 0 7 Q 3.5 0, 7 7 T 14 7" stroke="#1a1a1a" stroke-width="3" fill="none"/>
        <path d="M 0 7 Q 3.5 0, 7 7 T 14 7" stroke="#3a3a3a" stroke-width="1" fill="none" opacity="0.6"/>
      </pattern>
    </defs>
    <!-- main coil arc -->
    <path d="M 30 0 C 20 60, 100 50, 80 130"
          stroke="url(#coil)" stroke-width="14" fill="none" stroke-linecap="round"/>
    <!-- jack at top -->
    <rect x="22" y="-2" width="16" height="10" fill="#404040" rx="2"/>
    <rect x="26" y="-6" width="8" height="6" fill="#888" rx="1"/>
  </svg>

  <div class="speccy" aria-label="ZX Spectrum 48K">
    <div class="keymat">
      <div class="row">
        <div class="key">1</div><div class="key">2</div><div class="key">3</div>
        <div class="key">4</div><div class="key">5</div><div class="key">6</div>
        <div class="key">7</div><div class="key">8</div><div class="key">9</div>
        <div class="key">0</div>
      </div>
      <div class="row">
        <div class="key">Q</div><div class="key">W</div><div class="key">E</div>
        <div class="key">R</div><div class="key">T</div><div class="key">Y</div>
        <div class="key">U</div><div class="key">I</div><div class="key">O</div>
        <div class="key">P</div>
      </div>
      <div class="row">
        <div class="key">A</div><div class="key">S</div><div class="key">D</div>
        <div class="key">F</div><div class="key">G</div><div class="key">H</div>
        <div class="key">J</div><div class="key">K</div><div class="key">L</div>
        <div class="key wide">ENTER</div>
      </div>
      <div class="row">
        <div class="key wide">CAPS<br><span style="font-size:9px">SHIFT</span></div>
        <div class="key">Z</div><div class="key">X</div><div class="key">C</div>
        <div class="key">V</div><div class="key">B</div><div class="key">N</div>
        <div class="key">M</div>
        <div class="key wide">SYM<br><span style="font-size:9px">SHIFT</span></div>
        <div class="key wide">SPACE</div>
      </div>
    </div>

    <div class="badge">
      <span class="sinclair">Sinclair</span>
      <span class="zx">ZX Spectrum</span>
    </div>
    <div class="rainbow" aria-hidden="true">
      <span></span><span></span><span></span><span></span>
    </div>
  </div>

  <div class="caption">
    JDS — twenty-five years.<br>
    <span class="quiet">click the screen for sound · use the real keys</span>
  </div>

</div>

<script src="jsspeccy/jsspeccy.js"></script>
<script>
  const host = document.getElementById('jsspeccy');
  const emu = JSSpeccy(host, {
    machine: 48,
    zoom: 2,
    autoStart: true,
    autoLoadTapes: true,
    openUrl: 'card.tap',
    keyboardEventRoot: document,
  });

  // After JSSpeccy builds its UI, hide everything except the canvas,
  // and stretch the canvas to fill the TV's screen rectangle.
  function tidy() {
    const canvas = host.querySelector('canvas');
    if (!canvas) { requestAnimationFrame(tidy); return; }
    // Hide siblings of canvas-containing branches (toolbar, dialogs, menus, start button).
    Array.from(host.children).forEach((child) => {
      if (!child.contains(canvas)) child.style.display = 'none';
    });
    // Inside the canvas's parent, hide non-canvas siblings (e.g., start button).
    const parent = canvas.parentElement;
    Array.from(parent.children).forEach((sib) => {
      if (sib !== canvas) sib.style.display = 'none';
    });
    parent.style.width = '100%';
    parent.style.height = '100%';
  }
  requestAnimationFrame(tidy);

  // Audio policy: most browsers require a user gesture before audio plays.
  // We tell users via the caption; on click anywhere, kickstart audio.
  document.body.addEventListener('click', () => {
    try { emu.audioHandler && emu.audioHandler.start(); } catch (_) {}
  }, { once: true });
</script>

</body>
</html>
